version: "3.8"
# End-to-end docker-compose for fastlane-rfc2544
# Tests both tester and reflector containers via bridge network with IP-to-IP connectivity.

services:
  tester:
    build:
      context: ../../
      dockerfile: docker/tester/Dockerfile
    container_name: fastlane-tester
    command: [
      "eth0",
      "--test", "throughput,latency",
      "--size", "64,128,256,512,1024,1518",
      "--jumbo",
      "--num-queues", "4",
      "--rate-type", "cbr",
      "--resolution", "0.5",
      "--max-iter", "10",
      "--loss-tolerance", "0.01",
      "--output", "json",
      "--verbose",
      "--udp-src", "4200",
      "--udp-dst", "4200",
      "--tx-port", "0",
      "--rx-port", "0"
    ]
    depends_on:
      - reflector
    networks:
      fastlane_net:
        ipv4_address: 172.28.1.10
    volumes:
      - results:/fastlane/reports

  reflector:
    build:
      context: ../../
      dockerfile: docker/reflector/Dockerfile
    container_name: fastlane-reflector
    networks:
      fastlane_net:
        ipv4_address: 172.28.1.20

networks:
  fastlane_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
          gateway: 172.28.0.1

volumes:
  results:
